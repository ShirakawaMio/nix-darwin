name: Promote stable

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Commit, branch, or tag to promote. Defaults to the workflow ref."
        required: false
        type: string

permissions:
  contents: write
  models: read

env:
  NIX_DARWIN_HOSTNAME: ci-darwin
  NIX_DARWIN_USER: runner
  NIX_DARWIN_HOME: /Users/runner
  HOME_MANAGER_CONFIG: ci-linux
  HOME_MANAGER_SYSTEM: x86_64-linux
  AI_CHANGELOG_MODEL: openai/gpt-4.1
  BOOT_REF: ${{ github.sha }}
  BOOT_ARCHIVE_URL: https://github.com/${{ github.repository }}/archive/${{ github.sha }}.tar.gz

jobs:
  prepare:
    name: prepare candidate
    runs-on: ubuntu-latest
    outputs:
      candidate_sha: ${{ steps.candidate.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve candidate
        id: candidate
        shell: bash
        run: |
          set -euo pipefail

          source_ref="${{ inputs.source_ref }}"
          if [ -z "$source_ref" ]; then
            source_ref="${{ github.sha }}"
          fi

          git fetch --tags --force origin '+refs/heads/*:refs/remotes/origin/*'
          if git rev-parse --verify "$source_ref^{commit}" >/dev/null 2>&1; then
            sha="$(git rev-parse "$source_ref^{commit}")"
          else
            sha="$(git rev-parse "origin/$source_ref^{commit}")"
          fi
          printf 'sha=%s\n' "$sha" >> "$GITHUB_OUTPUT"
          printf 'Candidate: %s\n' "$sha"

  eval:
    name: eval candidate
    runs-on: ubuntu-latest
    needs: prepare
    env:
      BOOT_REF: ${{ needs.prepare.outputs.candidate_sha }}
      BOOT_ARCHIVE_URL: https://github.com/${{ github.repository }}/archive/${{ needs.prepare.outputs.candidate_sha }}.tar.gz
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Eval via one-line entry
        id: one_line
        continue-on-error: true
        run: |
          sh <(curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ needs.prepare.outputs.candidate_sha }}/scripts/install.sh) ci-check eval

      - name: Checkout candidate for fallback
        if: steps.one_line.outcome == 'failure'
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.candidate_sha }}
          fetch-depth: 0

      - name: Eval fallback
        if: steps.one_line.outcome == 'failure'
        run: ./scripts/ci-check.sh eval

  build-linux:
    name: build linux home-manager
    runs-on: ubuntu-latest
    needs: prepare
    env:
      BOOT_REF: ${{ needs.prepare.outputs.candidate_sha }}
      BOOT_ARCHIVE_URL: https://github.com/${{ github.repository }}/archive/${{ needs.prepare.outputs.candidate_sha }}.tar.gz
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Build Linux Home Manager via one-line entry
        id: one_line
        continue-on-error: true
        run: |
          sh <(curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ needs.prepare.outputs.candidate_sha }}/scripts/install.sh) ci-check build-home-linux

      - name: Checkout candidate for fallback
        if: steps.one_line.outcome == 'failure'
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.candidate_sha }}
          fetch-depth: 0

      - name: Build Linux Home Manager fallback
        if: steps.one_line.outcome == 'failure'
        run: ./scripts/ci-check.sh build-home-linux

  build-darwin:
    name: build darwin nix-darwin
    runs-on: macos-latest
    needs: prepare
    env:
      BOOT_REF: ${{ needs.prepare.outputs.candidate_sha }}
      BOOT_ARCHIVE_URL: https://github.com/${{ github.repository }}/archive/${{ needs.prepare.outputs.candidate_sha }}.tar.gz
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Build nix-darwin via one-line entry
        id: one_line
        continue-on-error: true
        run: |
          sh <(curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ needs.prepare.outputs.candidate_sha }}/scripts/install.sh) ci-check build-darwin

      - name: Checkout candidate for fallback
        if: steps.one_line.outcome == 'failure'
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.candidate_sha }}
          fetch-depth: 0

      - name: Build nix-darwin fallback
        if: steps.one_line.outcome == 'failure'
        run: ./scripts/ci-check.sh build-darwin

  promote:
    name: squash commit to stable
    runs-on: ubuntu-latest
    needs:
      - prepare
      - eval
      - build-linux
      - build-darwin
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.candidate_sha }}
          fetch-depth: 0

      - name: Push stable squash commit
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          stable_branch="stable"
          candidate_sha="${{ needs.prepare.outputs.candidate_sha }}"
          release_version="$(date -u '+%Y.%m.%d').${GITHUB_RUN_NUMBER}"
          changelog_file="$(mktemp)"
          commit_message_file="$(mktemp)"
          changelog_script="$(mktemp)"

          cp scripts/stable-changelog.sh "$changelog_script"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --force origin

          if git ls-remote --exit-code --heads origin "$stable_branch" >/dev/null 2>&1; then
            git fetch origin "$stable_branch"
            git checkout -B "$stable_branch" "origin/$stable_branch"
            has_stable=1
          else
            git checkout --orphan "$stable_branch"
            git rm -rf . >/dev/null 2>&1 || true
            has_stable=0
          fi

          git read-tree --reset -u "$candidate_sha"

          if [ "$has_stable" -eq 1 ] && git diff-index --quiet HEAD --; then
            printf 'stable already matches %s\n' "$candidate_sha"
            exit 0
          fi

          bash "$changelog_script" "$candidate_sha" "$release_version" "$changelog_file"

          previous_source_sha="$(
            git log --format=%B -n 1 "origin/$stable_branch" 2>/dev/null |
              sed -nE 's/^Squashed from ([0-9a-f]{40})\.?$/\1/p' |
              head -n 1 || true
          )"
          if [ -z "$previous_source_sha" ]; then
            previous_source_sha="none"
          fi
          if head -n 1 "$changelog_file" | grep -q '^AI changelog generation failed;'; then
            changelog_model="fallback git log"
          else
            changelog_model="${AI_CHANGELOG_MODEL:-openai/gpt-4.1}"
          fi

          {
            printf '%s\n\n' "$release_version"
            printf 'Change log since last update\n\n'
            cat "$changelog_file"
            printf '\nPrevious stable source: %s\n' "$previous_source_sha"
            printf 'Squashed from %s.\n' "$candidate_sha"
            printf 'Generated changelog model: %s.\n' "$changelog_model"
          } > "$commit_message_file"

          git commit -F "$commit_message_file"

          git push origin "HEAD:$stable_branch"
